apiVersion: apps/v1
kind: Deployment
metadata:
  name: tvs-dashboard
  namespace: traffic
spec:
  replicas: 3
  selector:
    matchLabels:
      app: tvs-dashboard
  template:
    metadata:
      labels:
        app: tvs-dashboard
    spec:
      nodeName: tvs-cluster-worker2  # force dashboard to same node remove it later
      containers:
      - name: dashboard
        image: hamzamalik1/traffic-dashboard:latest
        ports:
        - containerPort: 8501
        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"
          requests:
            memory: "128Mi"
            cpu: "100m"
        volumeMounts:
        - name: db-data
          mountPath: /app/database
        - name: evidence-data
          mountPath: /app/outputs
      volumes:
      - name: db-data
        persistentVolumeClaim:
          claimName: db-pvc
      - name: evidence-data
        persistentVolumeClaim:
          claimName: evidence-pvc
